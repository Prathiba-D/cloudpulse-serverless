<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CloudPulse Leads Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}
h1 {
    text-align: center;
}
table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}
th, td {
    border: 1px solid #ccc;
    padding: 10px;
}
th {
    background: #6366f1;
    color: white;
}
tr:hover {
    background: #f1f1f1;
}
</style>
</head>

<body>

<h1>📊 CloudPulse Leads Dashboard</h1>

<table id="leadsTable">
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Created At</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function fetchLeads() {
    try {
        const response = await fetch('https://*****************-api.us-east-1.amazonaws.com/dev/leads');
        
        const result = await response.json();

        // 🔥 IMPORTANT FIX: parse the body string
        const data = JSON.parse(result.body);

        const tbody = document.querySelector("#leadsTable tbody");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4">No leads found</td></tr>`;
            return;
        }

        data.forEach((lead, index) => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${lead.name || "-"}</td>
                <td>${lead.email || "-"}</td>
                <td>${lead.created_at || "-"}</td>
            `;

            tbody.appendChild(row);
        });

    } catch (error) {
        console.error("Error fetching leads:", error);

        document.querySelector("#leadsTable tbody").innerHTML =
            `<tr><td colspan="4">Error loading data</td></tr>`;
    }
}

fetchLeads();
</script>

</body>
</html>
