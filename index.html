<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse Serverless</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <section class="hero">
        <div class="container">

            <h1>CloudPulse Serverless</h1>

            <p>
                A serverless web application built on AWS, designed for real-time responsiveness and scalable performance.
            </p>
            <p>
                Experience a serverless architecture in action. Submit your details to trigger a real-time backend workflow...
            </p>
            <form class="form">
                <input type="text" name="name" id="name" placeholder="Your Name" required>
                <input type="email" name="email" id="email" placeholder="Your Email" required>
                <button type="submit">Trigger Workflow</button>
            </form>

        </div>
    </section>

    <script src="js/script.js"></script>

</body>
</html>
